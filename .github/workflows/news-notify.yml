name: 毎朝ニュースLINE通知

on:
  schedule:
    # 7時までに届くよう早め設定 = UTC 19:00（前日）※GitHub Actionsの遅延3時間バッファ
    - cron: '0 19 * * *'
  workflow_dispatch: # 手動実行ボタンも有効化

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 依存パッケージをインストール
        run: npm ci

      - name: ニュース通知を実行
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: node index.js